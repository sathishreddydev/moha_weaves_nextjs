name: Deploy Release (VPS)

on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "deploy-vps" to confirm VPS deployment'
        required: true
        default: ''

jobs:
  deploy-vps:
    runs-on: ubuntu-latest

    steps:
      - name: Confirm Deployment
        run: |
          if [ "${{ github.event.inputs.confirm_deployment }}" != "deploy-vps" ]; then
            echo "❌ Deployment not confirmed. Type 'deploy-vps' to proceed."
            exit 1
          fi
          echo "✅ VPS deployment confirmed. Proceeding..."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # NOTE: .env.local must already exist on the VPS with real credentials.
          # It is NOT committed to git and is NOT copied here.
          # Deploy it manually once: scp environments/.env.vps user@host:/opt/moha_weaves_nextjs/.env.local
          script: |
            set -euo pipefail
            cd /opt/moha_weaves_nextjs

            # Verify .env.local exists and has no placeholder values
            if grep -q 'REPLACE_WITH' .env.local 2>/dev/null; then
              echo "❌ .env.local still contains placeholder values. Populate it before deploying."
              exit 1
            fi
            if [ ! -f .env.local ]; then
              echo "❌ .env.local not found on VPS. Copy environments/.env.vps → .env.local first."
              exit 1
            fi

            git pull origin main
            docker compose down --remove-orphans
            docker compose up -d --build
            echo "✅ VPS deployment complete!"
