name: Deploy Release (VPS)

on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "deploy-vps" to confirm VPS deployment'
        required: true
        default: ''

jobs:
  deploy-vps:
    runs-on: ubuntu-latest

    steps:
      - name: Confirm Deployment
        run: |
          if [ "${{ github.event.inputs.confirm_deployment }}" != "deploy-vps" ]; then
            echo "❌ Deployment not confirmed. Type 'deploy-vps' to proceed."
            exit 1
          fi
          echo "✅ VPS deployment confirmed. Proceeding..."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/moha_weaves_nextjs
            git pull origin main
            cp .env.vps .env.local
            docker compose down
            docker compose up -d --build
            echo "✅ VPS deployment complete!"
